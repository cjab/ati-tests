# ATI Radeon R100 (Mobility M6) Chip-Specific Register Definitions
#
# This file contains registers that are ONLY present on R100,
# or registers that exist on both chips but have DIFFERENT layouts/behavior.
#
# Registers that are identical on both R128 and R100 belong in common.yaml.
#
# Reference key:
#   M6RG:<page>     - Rage Mobility M6 Register Reference Guide (PDF page number)
#   xorg:<file>     - xserver-xorg-video-ati/radeon driver source
#   linux:<file>    - Linux kernel radeon DRM driver source
#   hardware:<card> - Discovered through hardware experimentation

registers:
  # ===========================================================================
  # Bus Control
  # ===========================================================================
  BUS_CNTL:
    offset: 0x0030
    group: bus
    ref: "M6RG:2-10"
    fields:
      BUS_DBL_RESYNC:
        bit: 0
        description: "Add extra resynchronizing clock"
      BUS_MSTR_RESET:
        bit: 1
        access: wo
        description: "Reset bus master"
      BUS_FLUSH_BUF:
        bit: 2
        access: wo
        description: "Flush buffer"
      BUS_STOP_REQ_DIS:
        bit: 3
        description: "Disable stop request"
      BUS_READ_COMBINE_EN:
        bit: 4
        description: "Enable read combining"
      BUS_WRT_COMBINE_EN:
        bit: 5
        description: "Enable write combining"
      BUS_MASTER_DIS:
        bit: 6
        description: "Disable bus mastering (0=enable, 1=disable)"
      BIOS_ROM_WRT_EN:
        bit: 7
        description: "Enable BIOS ROM writes"
      BUS_PREFETCH_MODE:
        bits: [8, 9]
        description: "HI prefetch mode"
      BUS_VGA_PREFETCH_EN:
        bit: 10
        description: "Enable VGA prefetch"
      BUS_SGL_READ_DISABLE:
        bit: 11
        description: "Disable single read"
      BIOS_DIS_ROM:
        bit: 12
        description: "Disable ROM (0=enable, 1=disable)"
      BUS_PCI_READ_RETRY_EN:
        bit: 13
        description: "Enable PCI read retry"
      BUS_AGP_AD_STEPPING_EN:
        bit: 14
        description: "Enable AD stepping in AGP and PCI"
      BUS_PCI_WRT_RETRY_EN:
        bit: 15
        description: "Enable PCI write retry"
      BUS_RETRY_WS:
        bits: [16, 19]
      BUS_MSTR_RD_MULT:
        bit: 20
        description: "Read line (0) or read multiple (1)"
      BUS_MSTR_RD_LINE:
        bit: 21
        description: "Read multiple (0) or read line (1)"
      BUS_SUSPEND:
        bit: 22
        description: "Suspend bus master transfer"
      LAT_16X:
        bit: 23
        description: "Latency multiplier (0=1X, 1=16X)"
      BUS_RD_DISCARD_EN:
        bit: 24
        description: "Enable read discard"
      ENFRCWRDY:
        bit: 25
      BUS_MSTR_WS:
        bit: 26
        description: "Wait states (0=8, 1=32)"
      BUS_PARKING_DIS:
        bit: 27
        description: "Disable parking (0=enable, 1=disable)"
      BUS_MSTR_DISCONNECT_EN:
        bit: 28
        description: "Enable bus master disconnect"
      SERR_EN:
        bit: 29
        description: "Enable SERR"
      BUS_READ_BURST:
        bit: 30
        description: "Enable read burst"
      BUS_RDY_READ_DLY:
        bit: 31
        description: "RDY delayed 1 mem clk"

  # ===========================================================================
  # Display FIFO Arbitration
  # ===========================================================================
  GRPH_BUFFER_CNTL:
    offset: 0x02f0
    group: memory_buffer
    ref: "M6RG:2-67"
    fields:
      GRPH_START_REQ:
        bits: [0, 6]
        description: "Watermark to start memory requests (bits 0:1 hardwired to 0)"
      GRPH_STOP_REQ:
        bits: [8, 14]
        description: "Watermark to stop memory requests (bits 0:1 hardwired to 0)"
      GRPH_CRITICAL_POINT:
        bits: [16, 22]
        description: "Watermark for high-priority requests; 0x00 = always high priority"
      GRPH_CRITICAL_CNTL:
        bit: 28
      GRPH_BUFFER_SIZE:
        bit: 29
        description: "0=64 entries max, 1=96 entries max (should be 1)"
      GRPH_CRITICAL_AT_SOF:
        bit: 30
      GRPH_STOP_CNTL:
        bit: 31
    reserved:
      - bit: 7
      - bit: 15
      - bits: [23, 27]

  # ===========================================================================
  # Default Pitch/Offset Register (Combined)
  # R100 only - R128 uses separate DEFAULT_OFFSET (0x16E0) and DEFAULT_PITCH (0x16E4)
  # ===========================================================================
  DEFAULT_PITCH_OFFSET:
    offset: 0x16e0
    group: datapath
    ref: "M6RG:2-91"
    fields:
      DEFAULT_OFFSET:
        bits: [0, 21]
        description: "Offset in 1KB units (bits 9:0 hardwired to 0 on write)"
      DEFAULT_PITCH:
        bits: [22, 29]
        description: "Pitch in 64-byte units"
      DEFAULT_TILE:
        bits: [30, 31]
        values:
          LINEAR: 0
          TILED: 1
          MICROTILED: 2
          TILED_MICROTILED: 3

  # ===========================================================================
  # Display Base Address
  # R100 only - On R128, CRTC_OFFSET is absolute. On R100, display address
  # is CRTC_OFFSET + DISPLAY_BASE_ADDR
  # ===========================================================================
  DISPLAY_BASE_ADDR:
    offset: 0x023c
    group: crtc
    ref: "M6RG:2-142"
    description: "Base address added to CRTC_OFFSET. Should equal MC_FB_LOCATION.MC_FB_START << 16"

  # ===========================================================================
  # Memory Controller Framebuffer Location
  # Defines where framebuffer sits in internal 32-bit address space
  # ===========================================================================
  MC_FB_LOCATION:
    offset: 0x0148
    group: memory_buffer
    ref: "M6RG:2-68"
    fields:
      MC_FB_START:
        bits: [0, 15]
        description: "Start of framebuffer in internal address space (upper 16 bits, lower 22 bits are 0)"
      MC_FB_TOP:
        bits: [16, 31]
        description: "End of framebuffer in internal address space"

  MC_AGP_LOCATION:
    offset: 0x014c
    ref: "M6RG:2-69"
    group: memory_buffer
    fields:
      MC_AGP_START:
        bits: [0, 15]
        description: |
          Start location of AGP aperture. Load 16 MSBs only. LSBs assumed to be 0x0.
          Bits 0:5 are hardwired to zero.
      MC_AGP_TOP:
        bits: [16, 31]
        description: |
          Top location within AGP aperture. Load 16 MSBs only. LSBs assumed to be 0xffff.
          Bits 0:5 are hardwired to one.

  AGP_COMMAND:
    offset: 0x0f60
    group: bus
    ref: "M6RG:2-13"
    fields:
      DATA_RATE:
        bits: [0, 2]
      AGP_EN:
        bit: 8
      SBA_EN:
        bit: 9
      RQ_DEPTH:
        bits: [24, 31]
    reserved:
      - bits: [3, 7]
      - bits: [10, 23]

  CONFIG_APER_SIZE:
    offset: 0x0108
    group: config
    ref: "M6RG:2-7"
    fields:
      APER_SIZE:
        bits: [24, 27]
    reserved:
      - bits: [0, 23]
      - bits: [28, 31]

  # ===========================================================================
  # CRTC Registers
  # ===========================================================================
  CRTC_GEN_CNTL:
    offset: 0x0050
    group: crtc
    ref: "M6RG:29"
    fields:
      CRTC_DBL_SCAN_EN:
        bit: 0
      CRTC_INTERLACE_EN:
        bit: 1
      CRTC_C_SYNC_EN:
        bit: 4
      CRTC_PIX_WIDTH:
        bits: [8, 11]
        values:
          DISABLED: 0
          4BPP: 1
          8BPP: 2
          15BPP: 3
          16BPP_RGB: 4
          24BPP: 5
          32BPP: 6
          16BPP_ARGB: 7
          16BPP_AIDX: 8
      CRTC_ICON_EN:
        bit: 15
      CRTC_CUR_EN:
        bit: 16
      CRTC_VSTAT_MODE:
        bits: [17, 18]
      CRTC_CUR_MODE:
        bits: [20, 22]
        values:
          64X64_MONO: 0
      CRTC_EXT_DISP_EN:
        bit: 24
      CRTC_EN:
        bit: 25
      CRTC_DISP_REQ_EN_B:
        bit: 26
    reserved:
      - bits: [2, 3]
      - bits: [5, 7]
      - bits: [12, 14]
      - bit: 19
      - bit: 23
      - bits: [27, 31]

  CRTC_PITCH:
    offset: 0x022c
    group: crtc
    ref: "M6RG:2-206"
    fields:
      CRTC_PITCH:
        bits: [0, 10]
        description: "Display line pitch in (pixels * 8). For stereo mode, left image pitch."
      CRTC_PITCH_RIGHT:
        bits: [16, 26]
        description: "Right image pitch for stereo display mode"
    reserved:
      - bits: [11, 15]
      - bits: [27, 31]

  # ===========================================================================
  # CommandProcessor Registers
  # ===========================================================================
  CP_RB_BASE:
    offset: 0x0700
    group: misc
    ref: "M6RG:2-127"
    fields:
      RB_BASE:
        bits: [2, 31]
        description: "Ring buffer base. Address of the beginning of the ring buffer."

  CP_RB_WPTR_DELAY:
    offset: 0x0718
    group: misc
    ref: "M6RG:2-128"
    fields:
      PRE_WRITE_TIMER:
        bits: [0, 27]
      PRE_WRITE_LIMIT:
        bits: [28, 31]

  CP_RB_RPTR_ADDR:
    offset: 0x070c
    group: misc
    ref: "M6RG:2-127"
    fields:
      RB_RPTR_SWAP:
        bits: [0, 1]
      RB_RPTR_ADDR:
        bits: [2, 31]

  CP_RB_RPTR:
    offset: 0x0710
    group: misc
    ref: "M6RG:2-127"
    fields:
      RB_RPTR:
        bits: [0, 22]

  CP_RB_WPTR:
    offset: 0x0714
    group: misc
    ref: "M6RG:2-128"
    fields:
      RB_WPTR:
        bits: [0, 22]

  CP_CSQ_CNTL:
    offset: 0x0740
    group: misc
    fields:
      CSQ_CNT_PRIMARY:
        bits: [0, 7]
        description: |
          Count of available dwords in the queue for the primary stream. (read only)
      CSQ_CNT_INDIRECT:
        bits: [8, 15]
        description: |
          Count of available dwords in the queue for the indirect stream. (read only)
      CSQ_MODE:
        bits: [28, 31]
        description: |
          Command Stream Queue Mode. Controls whether each
          command stream is enabled, and whether it is in push
          mode (Programmed I/O), or pull mode (Bus-Master).
          Encodings are chosen to be compatible with Rage128.
        values:
          DISABLED: 0
          PIO: 1
          BM: 2
          PIO_INDBM: 3
          BM_INDBM: 4
          PIO_INDBM_5: 5
          BM_INDBM_6: 6
          PIO_INDBM_7: 7
          BM_INDBM_8: 8
          PIO_INDPIO: 15

  CP_STAT:
    offset: 0x07c0
    group: misc
    flags: [no_write]
    ref: "M6RG:2-134"
    fields:
      MRU_BUSY:
        bit: 0
        description: "Memory Read Unit is Busy"
      MWU_BUSY:
        bit: 1
        description: "Memory Write Unit is Busy"
      RSIU_BUSY:
        bit: 2
        description: "Register Server Interface is Busy"
      RCIU_BUSY:
        bit: 3
        description: "Register Client Interface is Busy"
      CSF_PRIMARY_BUSY:
        bit: 9
        description: "Command Stream Fetcher is Busy operating on the Primary Stream"
      CSF_INDIRECT_BUSY:
        bit: 10
        description: "Command Stream Fetcher is Busy operating on the Indirect Stream"
      CSQ_PRIMARY_BUSY:
        bit: 11
        description: "Command Stream Queue is Busy operating on the Primary Stream"
      CSQ_INDIRECT_BUSY:
        bit: 12
        description: "Command Stream Queue is Busy operating on the Indirect Stream"
      CSI_BUSY:
        bit: 13
        description: "Command Stream Interpreter is Busy"
      GUIDMA_BUSY:
        bit: 28
        description: "GUI DMA Engine is Busy"
      CMDSTRM_BUSY:
        bit: 30
        description: "Command Processor's Command Stream is Busy"
      CP_BUSY:
        bit: 31
        description: "Any Block in the CP is Busy"
    reserved:
      - bits: [4, 8]
      - bits: [14, 27]
      - bit: 29

  CP_ME_CNTL:
    offset: 0x07d0
    group: misc
    fields:
      ME_STAT:
        bits: [0, 15]
      ME_STATMUX:
        bits: [16, 20]
      ME_MODE:
        bit: 30
      ME_STEP:
        bit: 31

  CP_ME_RAM_ADDR:
    offset: 0x07d4
    group: misc
    fields:
      ME_RAM_ADDR:
        bits: [0, 7]
    reserved:
      - bits: [8, 31]

  CP_ME_RAM_RADDR:
    offset: 0x07d8
    group: misc
    fields:
      ME_RAM_RADDR:
        bits: [0, 7]
    reserved:
      - bits: [8, 31]

  CP_ME_RAM_DATAH:
    offset: 0x07dc
    group: misc
    flags: [indirect]
    fields:
      ME_RAM_DATAH:
        bits: [0, 5]
        description: "MicroEngine RAM data high used to load the MicroEngine RAM."

  CP_ME_RAM_DATAL:
    offset: 0x07e0
    group: misc
    flags: [read_side_effects, indirect]
    fields:
      ME_RAM_DATAL:
        bits: [0, 31]
        description: "MicroEngine RAM data low used to load the MicroEngine RAM."

  CP_CSQ_ADDR:
    offset: 0x07f0
    group: misc
    flags: [no_read]
    fields:
      CSQ_ADDR:
        bits: [2, 9]
    reserved:
      - bits: [0, 1]
      - bits: [10, 31]

  CP_CSQ_DATA:
    offset: 0x07f4
    group: misc
    flags: [no_write]
    fields:
      CSQ_DATA:
        bits: [0, 31]

  CP_CSQ_STAT:
    offset: 0x07f8
    ref: "M6RG:2-132"
    group: misc
    flags: [no_write]
    fields:
      CSQ_RPTR_PRIMARY:
        bits: [0, 7]
      CSQ_WPTR_PRIMARY:
        bits: [8, 15]
      CSQ_RPTR_INDIRECT:
        bits: [16, 23]
      CSQ_WPTR_INDIRECT:
        bits: [24, 31]

  CP_DEBUG:
    offset: 0x07ec
    group: misc
    fields:
      CP_DEBUG:
        bits: [0, 31]

  RBBM_STATUS:
    offset: 0x1740
    group: misc
    flags: [no_write]
    ref: "M6RG:2-79"
    description: Also accessible at offset 0x0E40.
    fields:
      CMDFIFO_AVAIL:
        bits: [0, 6]
        description: |
          Number of available entries (doublewords) in the Command FIFO. (default: 64).
      HIRQ_ON_RBB:
        bit: 8
        description: There is a request from the Host Interface on the backbone.
      CPRQ_ON_RBB:
        bit: 9
        description: There is a request from the Command Processor on the backbone.
      CFRQ_ON_RBB:
        bit: 10
        description: There is a request from the Command FIFO on the backbone.
      HIRQ_IN_RTBUF:
        bit: 11
        description: There is a request from the Host Interface present in the Retry Buffer.
      CPRQ_IN_RTBUF:
        bit: 12
        description: There is a request from the Command Processor present in the Retry Buffer.
      CFRQ_IN_RTBUF:
        bit: 13
        description: There is a request from the Command FIFO present in the Retry Buffer.
      CF_PIPE_BUSY:
        bit: 14
        description: The Command FIFO pipeline is busy.
      ENG_EV_BUSY:
        bit: 15
        description: The RBBM's Event Engine is Busy (waiting for a WAIT_UNTIL synchronization event).
      CP_CMDSTRM_BUSY:
        bit: 16
        description: The Command Processor's Command Stream is Busy.
      E2_BUSY:
        bit: 17
        description: 2D Engine is Busy
      RB2D_BUSY:
        bit: 18
        description: 2D portion of Render Backend is Busy
      RB3D_BUSY:
        bit: 19
        description: 3D portion of Render Backend is Busy
      SE_BUSY:
        bit: 20
        description: 3D Setup Engine is Busy
      RE_BUSY:
        bit: 21
        description: 3D Raster Engine is Busy
      TAM_BUSY:
        bit: 22
        description: 3D Texture Address Module is Busy
      TDM_BUSY:
        bit: 23
        description: 3D Texture Data Module is Busy
      PB_BUSY:
        bit: 24
        description: 3D Pixel Blender is Busy
      GUI_ACTIVE:
        bit: 31
        description: |
          2D engine busy OR 3D engine busy OR Command FIFO not empty OR
          CP Microengine busy OR Command Stream Queue not empty OR Ring Buffer not empty
    reserved:
      - bit: 7
      - bits: [25, 30]

  CP_CSQ_APER_PRIMARY:
    offset: 0x1000
    ref: "M6RG:2-133"
    group: misc
    fields:
      CP_CSQ_APER_PRIMARY:
        bits: [0, 31]

  RB2D_DSTCACHE_CTLSTAT:
    offset: 0x342C
    ref: "linux:radeon_cp.c"
    group: misc
    fields:
      RB2D_DC_FLUSH:
        bits: [0, 1]
      RB2D_DC_FREE:
        bits: [2, 3]
      RB2D_DC_BUSY:
        bit: 31
    aliases:
      RB2D_DC_FLUSH_ALL:
        bits: [0, 7]
        ref: "linux:drivers/char/drm/r128_drv.h:247"
    reserved:
      - bits: [3, 30]

  SCRATCH_ADDR:
    offset: 0x0774
    ref: "M6RG:2-130"
    group: misc
    fields:
      SCRATCH_ADDR:
        bits: [5, 31]
    reserved:
      - bits: [0, 4]

  SCRATCH_UMSK:
    offset: 0x770
    ref: "M6RG:2-129"
    group: misc
    fields:
      SCRATCH0_EN:
        bit: 0
      SCRATCH1_EN:
        bit: 1
      SCRATCH2_EN:
        bit: 2
      SCRATCH3_EN:
        bit: 3
      SCRATCH4_EN:
        bit: 4
      SCRATCH5_EN:
        bit: 5
      SCRATCH_SWAP:
        bits: [16, 17]
    reserved:
      - bits: [5, 15]
      - bits: [18, 31]

  # ===========================================================================
  # GART Registers
  # ===========================================================================
  AIC_CTRL:
    offset: 0x01d0
    ref: "M6RG:2-25"
    group: misc
    fields:
      TRANSLATE_EN:
        bit: 0
        description: "0=disable PCI GART, 1=enable PCI GART"
      HW_0_DEBUG:
        bit: 1
      HW_1_DEBUG:
        bit: 2
      HW_2_DEBUG:
        bit: 3
      HW_3_DEBUG:
        bit: 4
      HW_4_DEBUG:
        bit: 5
      HW_5_DEBUG:
        bit: 6
      HW_6_DEBUG:
        bit: 7
      HW_7_DEBUG:
        bit: 8
      HW_8_DEBUG:
        bit: 9
      HW_9_DEBUG:
        bit: 10
      HW_A_DEBUG:
        bit: 11
      HW_B_DEBUG:
        bit: 12
      HW_C_DEBUG:
        bit: 13
      HW_D_DEBUG:
        bit: 14
      HW_E_DEBUG:
        bit: 15
      HW_F_DEBUG:
        bit: 16
      HW_10_DEBUG:
        bit: 17
      HW_11_DEBUG:
        bit: 18
      HW_12_DEBUG:
        bit: 19
      HW_13_DEBUG:
        bit: 20
      HW_14_DEBUG:
        bit: 21
      HW_15_DEBUG:
        bit: 22
      HW_16_DEBUG:
        bit: 23
      HW_17_DEBUG:
        bit: 24
      HW_18_DEBUG:
        bit: 25
      HW_19_DEBUG:
        bit: 26
      HW_1A_DEBUG:
        bit: 27
      HW_1B_DEBUG:
        bit: 28
      HW_1C_DEBUG:
        bit: 29
      HW_1D_DEBUG:
        bit: 30
      HW_1E_DEBUG:
        bit: 31

  AIC_PT_BASE:
    offset: 0x01d8
    group: misc
    ref: "M6RG:2-26"
    fields:
      AIC_PT_BASE:
        bits: [12, 31]
    reserved:
      - bits: [0, 11]

  AIC_LO_ADDR:
    offset: 0x01dc
    group: misc
    ref: "M6RG:2-26"
    fields:
      AIC_LO_ADDR:
        bits: [12, 31]
    reserved:
      - bits: [0, 11]

  AIC_HI_ADDR:
    offset: 0x01e0
    group: misc
    ref: "M6RG:2-27"
    fields:
      AIC_HI_ADDR:
        bits: [12, 31]
    reserved:
      - bits: [0, 11]

  # ===========================================================================
  # VIP & I2C Registers
  # ===========================================================================
  VIPH_CONTROL:
    offset: 0x0c40
    group: misc

  RE_STIPPLE_ADDR:
    offset: 0x1cc8
    ref: "linux:radeon_drv.h"
    group: misc

  RE_STIPPLE_DATA:
    offset: 0x1ccc
    ref: "linux:radeon_drv.h"
    group: misc
    flags: [read_side_effects, indirect]
