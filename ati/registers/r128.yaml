# ATI Rage 128 Pro Chip-Specific Register Definitions
#
# This file contains registers that are ONLY present on R128,
# or registers that exist on both chips but have DIFFERENT layouts/behavior.
#
# Registers that are identical on both R128 and R100 belong in common.yaml.
#
# Reference key:
#   RRG:<page>      - Rage 128 Pro Register Reference Guide (PDF page number)
#   xorg:<file>     - xserver-xorg-video-r128 driver source
#   linux:<file>    - Linux kernel r128 DRM driver source
#   hardware:<card> - Discovered through hardware experimentation

registers:
  # ===========================================================================
  # DDA Registers (Display FIFO Arbitration)
  # R128 only - R100 uses GRPH_BUFFER_CNTL at 0x2F0 instead
  # On R100, these addresses (0x2E0-0x2E4) are DVI I2C controller registers!
  # ===========================================================================
  DDA_CONFIG:
    offset: 0x02e0
    group: memory_buffer
    ref: "RRG:93"

  DDA_ON_OFF:
    offset: 0x02e4
    group: memory_buffer
    ref: "RRG:93"

  # ===========================================================================
  # Datapath / Drawing Engine Registers
  # ===========================================================================
  DP_GUI_MASTER_CNTL:
    offset: 0x146c
    group: datapath
    ref: "RRG:190"
    fields:
      GMC_SRC_PITCH_OFFSET_CNTL:
        bit: 0
      GMC_DST_PITCH_OFFSET_CNTL:
        bit: 1
      GMC_SRC_CLIPPING:
        bit: 2
      GMC_DST_CLIPPING:
        bit: 3
      GMC_BRUSH_DATATYPE:
        bits: [4, 7]
        values:
          8X8_MONO: 0
          8X8_MONO_TRANS: 1
          8X1_MONO: 2
          8X1_MONO_TRANS: 3
          1X8_MONO: 4
          1X8_MONO_TRANS: 5
          32X1_MONO: 6
          32X1_MONO_TRANS: 7
          32X32_MONO: 8
          32X32_MONO_TRANS: 9
          8X8_COLOR: 10
          8X1_COLOR: 11
          1X8_COLOR: 12
          SOLIDCOLOR: 13
          NONE: 15
      GMC_DST_DATATYPE:
        bits: [8, 11]
        values:
          PSEUDO_COLOR_8: 2
          ARGB_1555: 3
          RGB_565: 4
          RGB_888: 5
          ARGB_8888: 6
          RGB_332: 7
          Y8_GREYSCALE: 8
          RGB_8_GREYSCALE: 9
          YUV_422_VYUY: 11
          YUV_422_YVYU: 12
          AYUV_444_8888: 14
          ARGB_4444: 15
      GMC_SRC_DATATYPE:
        bits: [12, 13]
        values:
          MONO: 0
          MONO_TRANS: 1
          DST_COLOR: 3
      GMC_BYTE_PIX_ORDER:
        bit: 14
      GMC_CONVERSION_TEMP:
        bit: 15
      GMC_ROP3:
        bits: [16, 23]
        values:
          SRCCOPY: 0xcc
      GMC_SRC_SOURCE:
        bits: [24, 26]
        values:
          MEMORY: 2
          HOST_DATA: 3
          HOST_DATA_ALIGNED: 4
      GMC_3D_FCN_EN:
        bit: 27
      GMC_CLR_CMP_CNTL_DIS:
        bit: 28
      GMC_AUX_CLIP_DIS:
        bit: 29
      GMC_WR_MSK_DIS:
        bit: 30
      GMC_LD_BRUSH_Y_X:
        bit: 31

  # ===========================================================================
  # Default Pitch/Offset Registers
  # R128 has separate registers; R100 uses combined DEFAULT_PITCH_OFFSET
  # ===========================================================================
  DEFAULT_OFFSET:
    offset: 0x16e0
    group: datapath
    ref: "RRG:243"
    fields:
      DEFAULT_OFFSET:
        bits: [0, 25]

  DEFAULT_PITCH:
    offset: 0x16e4
    group: datapath
    ref: "RRG:243"
    fields:
      DEFAULT_PITCH:
        bits: [0, 9]
      DEFAULT_TILE:
        bit: 16
    reserved:
      - bits: [10, 15]
      - bits: [17, 31]

  # ===========================================================================
  # CRTC Registers
  # ===========================================================================
  CRTC_GEN_CNTL:
    offset: 0x0050
    group: crtc
    ref: "RRG:80"
    fields:
      CRTC_DBL_SCAN_EN:
        bit: 0
      CRTC_INTERLACE_EN:
        bit: 1
      CRTC_C_SYNC_EN:
        bit: 4
      CRTC_PIX_WIDTH:
        bits: [8, 10]
        values:
          4BPP: 1
          8BPP: 2
          15BPP: 3
          16BPP: 4
          24BPP: 5
          32BPP: 6
      CRTC_CUR_EN:
        bit: 16
      CRTC_CUR_MODE:
        bits: [17, 19]
        values:
          64X64_MONO: 0
      CRTC_EXT_DISP_EN:
        bit: 24
      CRTC_EN:
        bit: 25
      CRTC_DISP_REQ_EN_B:
        bit: 26
    reserved:
      - bits: [2, 3]
      - bits: [5, 7]
      - bits: [11, 15]
      - bits: [20, 23]
      - bits: [27, 31]

  CRTC_PITCH:
    offset: 0x022c
    group: crtc
    ref: "RRG:74"
    fields:
      CRTC_PITCH:
        bits: [0, 9]
        description: "Display line pitch in (pixels * 8)"
    reserved:
      - bits: [10, 31]

  # ===========================================================================
  # PM4/CCE Registers
  # ===========================================================================
  PM4_BUFFER_OFFSET:
    offset: 0x0700
    group: misc
    ref: "linux:drivers/char/drm/r128_drv.h"

  PM4_BUFFER_CNTL:
    offset: 0x0704
    group: misc
    ref: "linux:drivers/char/drm/r128_drv.h:270"
    fields:
      PM4_BUFFER_SIZE_L2QW:
        bits: [0, 26]
        description: log2 of size of the ring buffer in quadwords
      PM4_BUFFER_CNTL_NOUPDATE:
        bit: 27
        description: |
          Always set when writing in available driver source. It's unclear what
          its exact purpose is.
      PM4_BUFFER_MODE:
        bits: [28, 31]
        description: |
          When this is set to anything other than NONPM4 all MMIO writes to the
          GUI engine registers are disabled. Everything must go through the
          CCE FIFO at that point.
        values:
          NONPM4: 0
          192PIO: 1
          192BM: 2
          128PIO_64INDBM: 3
          128BM_64INDBM: 4
          64PIO_128INDBM: 5
          64BM_128INDBM: 6
          64PIO_64VCBM_64INDBM: 7
          64BM_64VCBM_64INDBM: 8
          64PIO_64VCPIO_64INDPIO: 15

  PM4_BUFFER_WM_CNTL:
    offset: 0x0708
    group: misc
    ref: "linux:drivers/char/drm/r128_drv.h"

  PM4_BUFFER_DL_RPTR_ADDR:
    offset: 0x070c
    group: misc
    ref: "linux:drivers/char/drm/r128_drv.h"

  PM4_BUFFER_DL_RPTR:
    offset: 0x0710
    group: misc
    ref: "linux:drivers/char/drm/r128_drv.h"

  PM4_BUFFER_DL_WPTR:
    offset: 0x0714
    group: misc
    ref: "linux:drivers/char/drm/r128_drv.h"

  PM4_BUFFER_DL_WPTR_DELAY:
    offset: 0x0718
    group: misc
    ref: "RRG:238"

  PM4_BUFFER_ADDR:
    offset: 0x07f0
    group: misc

  PM4_MICRO_CNTL:
    offset: 0x07fc
    group: misc
    ref: "linux:drivers/char/drm/r128_drv.h:311"
    fields:
      ME_STAT:
        bits: [0, 15]
        ref: "M6RG:138"
        description: |
          Debug output field depending on ME_STAT_MUX. With mode 0
          (default), shows DWORDS remaining in current packet (0x3fff when idle).
          With mode 1, shows current target register address in >>2 encoding.
        values:
          IDLE: 0x3fff
      ME_STAT_MUX:
        bits: [16, 20]
        ref: "M6RG:138"
        description: |
          Selects what ME_STAT displays. Modes 0x00 and 0x01 are confirmed.
          Other modes (0x02-0x1f) show various internal state but their exact
          meaning is not yet understood. Some appear to show DP_GUI_MASTER_CNTL
          bit slices, packet header fields, or other internal registers.
        values:
          PKT_DWORDS_REMAIN: 0x0
          PKT_CURR_REGISTER: 0x1
      PM4_MICRO_FREERUN:
        bit: 30
        description: |
          When this bit is set packets are executed. When it is not set
          the engine is in step mode. Setting ME_STEP steps through each
          packet word in the FIFO.
      ME_STEP:
        bit: 31
        ref: "M6RG:138"
    unknown:
      - bits: [21, 29]

  PM4_FIFO_DATA_EVEN:
    offset: 0x1000
    group: misc
    flags: [no_read]

  PM4_FIFO_DATA_ODD:
    offset: 0x1004
    group: misc
    flags: [no_read]

  PM4_MICROCODE_ADDR:
    offset: 0x07d4
    group: misc
    fields:
      PM4_MICROCODE_ADDR:
        bits: [0, 7]

  PM4_MICROCODE_RADDR:
    offset: 0x07d8
    group: misc
    flags: [no_read]
    description: |
      Read address register for microcode. Write-only (reads return 0). Use this
      to set the address before reading via DATAH/DATAL. Using ADDR instead of
      RADDR before a read corrupts the first instruction read. Writes to RADDR
      also update ADDR (they share the underlying pointer), but RADDR sets a
      "read mode" flag that ADDR does not. Defined in headers but never
      used in driver code.

  PM4_MICROCODE_DATAH:
    offset: 0x07dc
    group: misc
    flags: [indirect]

  PM4_MICROCODE_DATAL:
    offset: 0x07e0
    group: misc
    flags: [read_side_effects, indirect]

  PM4_STAT:
    offset: 0x07b8
    group: gui_status
    flags: [no_write]
    ref: "linux:drivers/char/drm/r128_drv.h:300"
    description: |
      Mirrors GUI_STAT bits 16-31 exactly. Only the FIFOCNT field (bits 0-11)
      differs - it reflects the CCE FIFO instead of the GUI command FIFO.
    fields:
      PM4_FIFOCNT:
        bits: [0, 11]
        description: Number of CCE FIFO slots currently available (max depends on PM4_BUFFER_MODE).
      PM4_BUSY:
        bit: 16
        description: PM4 microengine is busy processing.
      MICRO_BUSY:
        bit: 17
        description: State of the micro engine.
      FPU_BUSY:
        bit: 18
        description: State of the pre-setup engine.
      VC_BUSY:
        bit: 19
        description: State of the vertex controller engine.
      IDCT_BUSY:
        bit: 20
        description: State of the IDCT engine.
      ENG_EV_BUSY:
        bit: 21
        description: State of the event engine.
      SETUP_BUSY:
        bit: 22
        description: State of the setup engine.
      EDGEWALK_BUSY:
        bit: 23
        description: State of the edgewalker pipeline.
      ADDRESSING_BUSY:
        bit: 24
        description: State of the texel/destination addressing pipeline.
      ENG_3D_BUSY:
        bit: 25
        description: State of the eng_3d data pipeline.
      ENG_2D_SM_BUSY:
        bit: 26
        description: State of the eng_2d state machine.
      ENG_2D_BUSY:
        bit: 27
        description: State of the eng_2d pipeline.
      GUI_WB_BUSY:
        bit: 28
        description: State of the GUI write buffer.
      CACHE_BUSY:
        bit: 29
        description: State of the pixel cache.
      PM4_GUI_ACTIVE:
        bit: 31
        description: OR of all busy bits above - indicates any GPU activity.
    reserved:
      - bits: [12, 15]
      - bit: 30

  # ===========================================================================
  # GUI Status Registers
  # ===========================================================================
  GUI_STAT:
    offset: 0x1740
    group: gui_status
    flags: [no_write]
    ref: "RRG:201"
    fields:
      GUI_FIFO_CNT:
        bits: [0, 11]
      PM4_BUSY:
        bit: 16
      MICRO_BUSY:
        bit: 17
      FPU_BUSY:
        bit: 18
      VC_BUSY:
        bit: 19
      IDCT_BUSY:
        bit: 20
      ENG_EV_BUSY:
        bit: 21
      SETUP_BUSY:
        bit: 22
      EDGEWALK_BUSY:
        bit: 23
      ADDRESSING_BUSY:
        bit: 24
      ENG_3D_BUSY:
        bit: 25
      ENG_2D_SM_BUSY:
        bit: 26
      ENG_2D_BUSY:
        bit: 27
      GUI_WB_BUSY:
        bit: 28
      CACHE_BUSY:
        bit: 29
      GUI_ACTIVE:
        bit: 31
    reserved:
      - bits: [12, 15]
      - bit: 30


  # ===========================================================================
  # Reset & Engine Control Registers
  # ===========================================================================
  GEN_RESET_CNTL:
    offset: 0x00f0
    group: misc
    ref: "RRG:219"
    fields:
      SOFT_RESET_GUI:
        bit: 0

  PC_NGUI_CTLSTAT:
    offset: 0x0184
    group: gui_control
    ref: "RRG:253"
    fields:
      PC_FLUSH_GUI:
        bits: [0, 1]
      PC_RI_GUI:
        bits: [2, 3]
      PC_FLUSH_NONGUI:
        bits: [4, 5]
      PC_RI_NONGUI:
        bits: [6, 7]
      PC_PURGE_GUI:
        bit: 8
      PC_PURGE_NONGUI:
        bit: 9
      PC_DIRTY:
        bit: 24
      PC_PURGE_DOPURGE:
        bit: 25
      PC_FLUSH_DOFLUSH:
        bit: 26
      PC_BUSY_INIT:
        bit: 27
      PC_BUSY_FLUSH:
        bit: 28
      PC_BUSY_GUI:
        bit: 29
      PC_BUSY_NGUI:
        bit: 30
      PC_BUSY:
        bit: 31
    aliases:
      PC_FLUSH_ALL:
        bits: [0, 7]
        ref: "linux:drivers/char/drm/r128_drv.h:247"
    reserved:
      - bits: [10, 23]

  # ===========================================================================
  # 3D Registers
  # ===========================================================================
  SCALE_3D_CNTL:
    offset: 0x1a00
    group: misc

  # ===========================================================================
  # VIP & I2C Registers
  # ===========================================================================
  VIPH_CONTROL:
    offset: 0x01d0
    group: misc
