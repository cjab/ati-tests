# ATI Rage 128 Pro Register Definitions
#
# Reference key:
#   RRG:<page>      - Rage 128 Pro Register Reference Guide (PDF page number)
#   M6RG:<page>     - Rage Mobility M6 Register Reference Guide (PDF page number)
#   xorg:<file>     - xserver-xorg-video-r128 driver source
#   linux:<file>    - Linux kernel r128 DRM driver source
#   hardware:<card> - Not documented or used in drivers, discovered
#                     through experimentation on this specific card
#
# Field format:
#   bit: N           - single bit at position N
#   bits: [lo, hi]   - multi-bit field from lo to hi (inclusive)
#   values:          - named constants for field values
#   flags:           - flags (listed below) that apply to this field
#   ref:             - where information about this field was found
#   description:     - a short description of the field
#
# Flags (optional list, default is readable + writable):
#   no_read            - register cannot be read (write-only)
#   no_write           - register cannot be written (read-only)
#   read_side_effects  - reading modifies hardware state (e.g., auto-increment)
#   indirect           - access requires index register to be set first
#   reverse_engineered - not documented or used in dirvers, discovered through
#                        experimentation
#
# unknown:          - bit ranges with observable behavior but unknown purpose
#                     supports: bit, bits, description (description is for
#                     documentation only, not currently displayed)

groups:
  config:
    name: "Configuration Registers"
    ref: "RRG:20"
  crtc:
    name: "CRTC"
    ref: "RRG:79"
  dac:
    name: "DAC"
    ref: "RRG:141"
  memory_buffer:
    name: "Memory Buffer Control"
    ref: "RRG:93"
  overscan:
    name: "Overscan"
    ref: "RRG:97"
  scratch_pad:
    name: "Scratch Pad"
    ref: "RRG:103"
  gui_dest:
    name: "Destination GUI Registers"
    ref: "RRG:155"
  gui_source:
    name: "Source GUI Registers"
    ref: "RRG:164"
  host_data:
    name: "Host Data Registers"
    ref: "RRG:167"
  scissor:
    name: "Scissor Registers"
    ref: "RRG:173"
  datapath:
    name: "Datapath Registers"
    ref: "RRG:182"
  gui_control:
    name: "GUI Engine Control Registers"
    ref: "RRG:200"
  gui_status:
    name: "GUI Engine Status Registers"
    ref: "RRG:201"
  misc:
    name: "Miscellaneous"
    ref: "RRG:207"

registers:
  # ===========================================================================
  # CRTC Registers
  # ===========================================================================
  CRTC_EXT_CNTL:
    offset: 0x0054
    group: crtc
    ref: "RRG:82"
    fields:
      CRTC_VGA_XOVERSCAN:
        bit: 0
      VGA_BLINK_RATE:
        bits: [1, 2]
      VGA_ATI_LINEAR:
        bit: 3
      VGA_128KAP_PAGING:
        bit: 4
      VGA_TEXT_132:
        bit: 5
      VGA_XCRT_CNT_EN:
        bit: 6
      CRTC_HSYNC_DIS:
        bit: 8
      CRTC_VSYNC_DIS:
        bit: 9
      CRTC_DISPLAY_DIS:
        bit: 10
      CRTC_SYNC_TRISTATE:
        bit: 11
      CRTC_HSYNC_TRISTATE:
        bit: 12
      CRTC_VSYNC_TRISTATE:
        bit: 13
      CRTC_CRT_ON:
        bit: 15
      VGA_CUR_B_TEST:
        bit: 17
      VGA_PACK_DIS:
        bit: 18
      VGA_MEM_PS_EN:
        bit: 19
      VGA_READ_PREFETCH_DIS:
        bit: 20
      DFIFO_EXTSENSE:
        bit: 21
      FP_OUT_EN:
        bit: 22
      FP_ACTIVE:
        bit: 23
      VCRTC_IDX_MASTER:
        bits: [24, 30]
    reserved:
      - bit: 7
      - bit: 14
      - bit: 16
      - bit: 31

  CRTC_H_TOTAL_DISP:
    offset: 0x0200
    group: crtc
    ref: "RRG:79"
    fields:
      CRTC_H_TOTAL:
        bits: [0, 8]
      CRTC_H_DISP:
        bits: [16, 23]
    reserved:
      - bits: [9, 15]
      - bits: [24, 31]

  CRTC_H_SYNC_STRT_WID:
    offset: 0x0204
    group: crtc
    ref: "RRG:79"
    fields:
      CRTC_H_SYNC_STRT_PIX:
        bits: [0, 2]
      CRTC_H_SYNC_STRT_CHAR:
        bits: [3, 11]
      CRTC_H_SYNC_WID:
        bits: [16, 21]
      CRTC_H_SYNC_POL:
        bit: 23
    reserved:
      - bits: [12, 15]
      - bit: 22
      - bits: [24, 31]

  CRTC_V_TOTAL_DISP:
    offset: 0x0208
    group: crtc
    ref: "RRG:79"
    fields:
      CRTC_V_TOTAL:
        bits: [0, 10]
      CRTC_V_DISP:
        bits: [16, 26]
    reserved:
      - bits: [11, 15]
      - bits: [27, 31]

  CRTC_V_SYNC_STRT_WID:
    offset: 0x020c
    group: crtc
    ref: "RRG:80"
    fields:
      CRTC_V_SYNC_STRT:
        bits: [0, 10]
      CRTC_V_SYNC_WID:
        bits: [16, 20]
      CRTC_V_SYNC_POL:
        bit: 23
    reserved:
      - bits: [11, 15]
      - bits: [21, 22]
      - bits: [24, 31]

  CRTC_OFFSET:
    offset: 0x0224
    group: crtc

  CRTC_OFFSET_CNTL:
    offset: 0x0228
    group: crtc

  # ===========================================================================
  # DAC Registers
  # ===========================================================================
  DAC_CNTL:
    offset: 0x0058
    group: dac
    ref:
      - "RRG:142"
      - "M6RG:26"
    fields:
      DAC_RANGE_CNTL:
        bits: [0, 1]
      DAC_BLANKING:
        bit: 2
      DAC_CMP_EN:
        bit: 3
      DAC_CMP_OUT_R:
        bit: 4
      DAC_CMP_OUT_G:
        bit: 5
      DAC_CMP_OUT_B:
        bit: 6
      DAC_CMP_OUTPUT:
        bit: 7
      DAC_8BIT_EN:
        bit: 8
      DAC_4BPP_PIX_ORDER:
        bit: 9
      DAC_TVO_EN:
        bit: 10
      DAC_TVO_OVR_EXCL:
        bit: 11
      DAC_TVO_16BPP_DITH_EN:
        bit: 12
      DAC_VGA_ADR_EN:
        bit: 13
      DAC_EXPAND_MODE:
        bit: 14
      DAC_PDWN:
        bit: 15
      CRT_SENSE:
        bit: 16
      CRT_DETECTION_ON:
        bit: 17
      DAC_CRC_CONT_EN:
        bit: 18
      DAC_CRC_EN:
        bit: 19
      DAC_CRC_FIELD:
        bit: 20
      DAC_LUT_COUNTER_LIMIT:
        bits: [21, 22]
      DAC_LUT_READ_SEL:
        bit: 23
      DAC_MASK:
        bits: [24, 31]

  PALETTE_INDEX:
    offset: 0x00b0
    group: dac

  PALETTE_DATA:
    offset: 0x00b4
    group: dac
    flags: [read_side_effects]

  # ===========================================================================
  # Interrupt Registers
  # ===========================================================================
  GEN_INT_CNTL:
    offset: 0x0040
    group: misc
    ref:
      - "RRG:211"
      - "M6RG:92"
    fields:
      CRTC_VBLANK_INT_EN:
        bit: 0
      CRTC_VLINE_INT_EN:
        bit: 1
      CRTC_VSYNC_INT_EN:
        bit: 2
      SNAPSHOT_INT_EN:
        bit: 3
      FP_DETECT_MASK:
        bit: 4
      CRTC2_VLINE_MASK:
        bit: 5
      CRTC2_VSYNC_MASK:
        bit: 6
      SNAPSHOT2_MASK:
        bit: 7
      CRTC_VBLANK_MASK:
        bit: 9
      FP_DETECT_INT_EN:
        bit: 10
      VSYNC_DIFF_OVER_LIMIT_MASK:
        bit: 11
      BUSMASTER_EOL_INT_EN:
        bit: 16
      I2C_INT_EN:
        bit: 17
      MPP_GP_INT_EN:
        bit: 18
      GUI_IDLE_INT_EN:
        bit: 19
      VIPH_INT_EN:
        bit: 24
      SW_INT_EN:
        bit: 25
      GEYSERVILLE_MASK:
        bit: 27
      HDCP_AUTHORIZED_INT_MASK:
        bit: 28
      DVI_I2C_INT_MASK:
        bit: 29
      GUIDMA_MASK:
        bit: 30
    reserved:
      - bit: 8
      - bits: [12, 15]
      - bits: [20, 23]
      - bit: 26
      - bit: 31

  # ===========================================================================
  # Overscan Registers
  # ===========================================================================
  OVR_CLR:
    offset: 0x0230
    group: overscan

  OVR_WID_LEFT_RIGHT:
    offset: 0x0234
    group: overscan
    notes: Minor differences in field widths between r128 and r100. See docs.

  OVR_WID_TOP_BOTTOM:
    offset: 0x0238
    group: overscan
    notes: Minor differences in field widths between r128 and r100. See docs.

  # ===========================================================================
  # Overlay & Video Registers
  # ===========================================================================
  OV0_SCALE_CNTL:
    offset: 0x0420
    group: misc

  # ===========================================================================
  # Multimedia Port Processor Registers
  # ===========================================================================
  MPP_TB_CONFIG:
    offset: 0x01c0
    group: misc

  MPP_GP_CONFIG:
    offset: 0x01c8
    group: misc

  # ===========================================================================
  # MPEG/DVD Registers
  # ===========================================================================
  SUBPIC_CNTL:
    offset: 0x0540
    group: misc

  # ===========================================================================
  # VIP & I2C Registers
  # ===========================================================================
  I2C_CNTL_1:
    offset: 0x0094
    group: misc

  # ===========================================================================
  # Capture Registers
  # ===========================================================================
  CAP0_TRIG_CNTL:
    offset: 0x0950
    group: misc

  CAP1_TRIG_CNTL:
    offset: 0x09c0
    group: misc

  # ===========================================================================
  # GUI Status Registers
  # ===========================================================================
  GUI_PROBE:
    offset: 0x16bc
    group: gui_status
    flags: [no_write]
    ref: "RRG:247"
    fields:
      GUI_STATE:
        bits: [0, 2]
        description: eng_2d state machine
        values:
          IDLE: 0
          DO_COLOR_WRITE: 1
          DO_SPAN_EVEN: 2
          DO_SPAN: 3
          WAIT_FOR_SPAN: 6
          WAIT_FOR_PIPE_EMPTY: 7
      GUI_SPAN_REQ:
        bit: 8
        description: Span FIFO request
      GUI_SPAN_RDY:
        bit: 9
        description: Span FIFO ready
      GUI_REQ_SRCS:
        bit: 10
        description: All required sources present (stage 1 write)
      GUI_HOST_REQ:
        bit: 11
        description: HOST_DATA request
      GUI_HOST_RDY:
        bit: 12
        description: HOST_DATA ready
      GUI_SRC_REQ:
        bit: 13
        description: SRC/Z request
      GUI_SRC_RDY:
        bit: 14
        description: SRC/Z ready
      GUI_E3D_REQ:
        bit: 15
        description: 3D data request
      GUI_E3D_RDY:
        bit: 16
        description: 3D data ready
      GUI_DST_REQ:
        bit: 17
        description: DST request
      GUI_DST_RDY:
        bit: 18
        description: DST ready
      GUI_WRT_REQ:
        bit: 19
        description: DST write request
      GUI_WRT_ZS_REQ:
        bit: 20
        description: Z write request
      GUI_WRT_RDY:
        bit: 21
        description: Write ready
    reserved:
      - bits: [3, 7]
      - bits: [22, 31]

  DP_MIX:
    offset: 0x16c8
    group: datapath
    ref: "RRG:189"
    fields:
      DP_SRC_SOURCE:
        bits: [8, 10]
        values:
          MEMORY: 2
          HOST_DATA: 3
          HOST_DATA_ALIGNED: 4
      DP_ROP3:
        bits: [16, 23]
    reserved:
      - bits: [0, 7]
      - bits: [11, 15]
      - bits: [24, 31]

  DP_WRITE_MSK:
    offset: 0x16cc
    group: datapath

  DP_CNTL:
    offset: 0x16c0
    group: datapath
    ref: "RRG:182"
    fields:
      DST_X_LEFT_TO_RIGHT:
        bit: 0
        description: "Destination X direction (0=right-to-left, 1=left-to-right)"
      DST_Y_TOP_TO_BOTTOM:
        bit: 1
        description: "Destination Y direction (0=bottom-to-top, 1=top-to-bottom)"
      DST_Y_MAJOR:
        bit: 2
        description: "Y major axis flag for bresenham lines (0=X major, 1=Y major)"
      DST_X_TILE:
        bit: 3
        description: "Enables rectangular tiling in the X direction"
      DST_Y_TILE:
        bit: 4
        description: "Enables rectangular tiling in the Y direction"
      DST_LAST_PEL:
        bit: 5
        description: "Destination last pel enable for lines"
      TRAIL_X_DIR:
        bit: 6
        description: "Trapezoid trailing edge direction (0=right-to-left, 1=left-to-right)"
      TRAIL_FILL_DIR:
        bit: 7
        description: "Trapezoid fill direction (0=right-to-left, 1=left-to-right)"
      BRES_SIGN:
        bit: 8
        description: "Bresenham sign (0=zero error term positive, 1=negative)"
      DP_CULL_TRI:
        bit: 9
        description: "Cull triangle - issue single 0-length span and exit"
      POLY_LINE:
        bit: 15
        description: "Current line is not the last line of a polyline"
      DP_RASTER_STALL:
        bit: 16
        description: "Stall DST operations until raster passes current location"
      DP_TRI_DIS:
        bit: 17
        description: "Triangle disable - accept but draw no pixels"
      DP_POLY_EDGE:
        bit: 18
        description: "Line is an anti-aliased edge of a polygon"
      ANTI_ALIAS_INV_DMAJOR:
        bits: [19, 22]
        description: "Mantissa of inverse DMAJOR in normalized (1.xxxx) format"
      ANTI_ALIAS_SHIFT:
        bits: [23, 27]
        description: "Right shifts to Bresenham error term for anti-aliased lines"
      ANTI_ALIAS_SLOPE:
        bits: [28, 31]
        description: "MSBs of absolute slope (DMINOR/DMAJOR), 0xF = 45 degrees"
    reserved:
      - bits: [10, 14]

  DP_BRUSH_BKGD_CLR:
    offset: 0x15dc
    group: datapath

  DP_BRUSH_FRGD_CLR:
    offset: 0x1578
    group: datapath

  DP_SRC_BKGD_CLR:
    offset: 0x15dc
    group: datapath

  DP_SRC_FRGD_CLR:
    offset: 0x15d8
    group: datapath

  # ===========================================================================
  # GUI Scratch Registers
  # ===========================================================================
  BIOS_0_SCRATCH:
    offset: 0x0010
    group: scratch_pad

  BIOS_1_SCRATCH:
    offset: 0x0014
    group: scratch_pad

  BIOS_2_SCRATCH:
    offset: 0x0018
    group: scratch_pad

  BIOS_3_SCRATCH:
    offset: 0x001c
    group: scratch_pad

  GUI_SCRATCH_REG0:
    offset: 0x15e0
    group: scratch_pad

  GUI_SCRATCH_REG1:
    offset: 0x15e4
    group: scratch_pad

  GUI_SCRATCH_REG2:
    offset: 0x15e8
    group: scratch_pad

  GUI_SCRATCH_REG3:
    offset: 0x15ec
    group: scratch_pad

  GUI_SCRATCH_REG4:
    offset: 0x15f0
    group: scratch_pad

  GUI_SCRATCH_REG5:
    offset: 0x15f4
    group: scratch_pad

  # ===========================================================================
  # Scissor / Clipping Registers
  # ===========================================================================
  SC_LEFT:
    offset: 0x1640
    group: scissor

  SC_TOP:
    offset: 0x1648
    group: scissor

  SC_RIGHT:
    offset: 0x1644
    group: scissor
    description: Inclusive on r128 and exclusive on r100

  SC_BOTTOM:
    offset: 0x164c
    group: scissor
    description: Inclusive on r128 and exclusive on r100

  SC_TOP_LEFT:
    offset: 0x16ec
    group: scissor
    flags: [no_read]

  SC_BOTTOM_RIGHT:
    offset: 0x16f0
    group: scissor
    flags: [no_read]
    description: Values are inclusive on r128 and exclusive on r100

  SRC_SC_BOTTOM:
    offset: 0x165c
    group: scissor

  SRC_SC_RIGHT:
    offset: 0x1654
    group: scissor

  SRC_SC_BOTTOM_RIGHT:
    offset: 0x16f4
    group: scissor
    flags: [no_read]

  DEFAULT_SC_BOTTOM_RIGHT:
    offset: 0x16e8
    group: scissor
    description: Values are inclusive on r128 and exclusive on r100
    fields:
      DEFAULT_SC_RIGHT:
        bits: [0, 13]
      DEFAULT_SC_BOTTOM:
        bits: [16, 29]
    reserved:
      - bits: [14, 15]
      - bits: [30, 31]

  AUX_SC_CNTL:
    offset: 0x1660
    group: scissor

  # ===========================================================================
  # Destination Registers
  # ===========================================================================
  DST_OFFSET:
    offset: 0x1404
    group: gui_dest

  DST_PITCH:
    offset: 0x1408
    group: gui_dest

  DST_X:
    offset: 0x141c
    group: gui_dest

  DST_Y:
    offset: 0x1420
    group: gui_dest

  DST_X_Y:
    offset: 0x1594
    group: gui_dest
    flags: [no_read]

  DST_Y_X:
    offset: 0x1438
    group: gui_dest
    flags: [no_read]

  DST_WIDTH:
    offset: 0x140c
    group: gui_dest

  DST_HEIGHT:
    offset: 0x1410
    group: gui_dest

  DST_WIDTH_HEIGHT:
    offset: 0x1598
    group: gui_dest

  DST_BRES_ERR:
    offset: 0x1628
    group: gui_dest

  DST_BRES_INC:
    offset: 0x162c
    group: gui_dest

  DST_BRES_DEC:
    offset: 0x1630
    group: gui_dest

  # ===========================================================================
  # Source Registers
  # ===========================================================================
  SRC_OFFSET:
    offset: 0x15ac
    group: gui_source

  SRC_PITCH:
    offset: 0x15b0
    group: gui_source

  SRC_X:
    offset: 0x141c
    group: gui_source

  SRC_Y:
    offset: 0x1420
    group: gui_source

  SRC_X_Y:
    offset: 0x1590
    group: gui_source
    flags: [no_read]

  SRC_Y_X:
    offset: 0x1434
    group: gui_source
    flags: [no_read]

  # ===========================================================================
  # Host Data Registers
  # ===========================================================================
  HOST_DATA0:
    offset: 0x17c0
    group: host_data
    flags: [no_read]

  HOST_DATA1:
    offset: 0x17c4
    group: host_data
    flags: [no_read]

  HOST_DATA2:
    offset: 0x17c8
    group: host_data
    flags: [no_read]

  HOST_DATA3:
    offset: 0x17cc
    group: host_data
    flags: [no_read]

  HOST_DATA4:
    offset: 0x17d0
    group: host_data
    flags: [no_read]

  HOST_DATA5:
    offset: 0x17d4
    group: host_data
    flags: [no_read]

  HOST_DATA6:
    offset: 0x17d8
    group: host_data
    flags: [no_read]

  HOST_DATA7:
    offset: 0x17dc
    group: host_data
    flags: [no_read]

  HOST_DATA_LAST:
    offset: 0x17e0
    group: host_data
    flags: [no_read]

  # ===========================================================================
  # Indirect MM Registers
  # ===========================================================================
  MM_INDEX:
    offset: 0x0
    group: misc
  MM_DATA:
    offset: 0x4
    group: misc
